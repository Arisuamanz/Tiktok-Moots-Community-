<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikMoots | Connecting...</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-blue: #007bff;
            --dark-bg: #0a0e14;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: var(--dark-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Kesan Glow Lembut */
        .glow-effect {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.2) 0%, transparent 70%);
            animation: breathe 3s infinite alternate;
        }

        @keyframes breathe {
            from { transform: scale(0.8); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 1; }
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Loading Dots yang comel */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="glow-effect"></div>

    <div class="content">
        <h1>Loading To Tikmoots</h1>
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // Pengalihan ke pautan anda
        setTimeout(function() {
            window.location.href = "https://play.google.com/store/apps/details?id=com.Kitricky.MyWaifuGirlfriend";
        }, 2500);
    </script>
</body>
</html>
