<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikMoots Redirect</title>
    <!-- CSS sangat ringkas untuk kepantasan -->
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #00f2ff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif;
            text-transform: uppercase;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #00f2ff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <div class="loader"></div>
        <div>Loading TikMoots...</div>
    </div>

    <script>
        // Redirect serta-merta tanpa delay yang tidak perlu
        window.location.replace("https://play.google.com/store/apps/details?id=com.Kitricky.MyWaifuGirlfriend");
    </script>
</body>
</html>
